<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>CRM KIUVO — Pantallas</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
<link rel="stylesheet" href="src/tokens.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif; }
  #root { height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/data.js"></script>
<script type="text/babel" src="src/design-canvas.jsx"></script>
<script type="text/babel" src="src/tweaks-panel.jsx"></script>
<script type="text/babel" src="src/Mobile.jsx"></script>
<script type="text/babel" src="src/Admin.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "metaState": "red"
}/*EDITMODE-END*/;

// Phone bezel — fixed iPhone 14-ish proportions, 402x874 inner
function Phone({ children }) {
  return (
    <div style={{
      width: 402, height: 874, borderRadius: 48, padding: 0,
      background: '#000', position: 'relative',
      boxShadow: '0 0 0 1px rgba(0,0,0,0.12), 0 30px 60px rgba(0,0,0,0.15)',
    }}>
      <div style={{
        position: 'absolute', inset: 6, borderRadius: 42, overflow: 'hidden',
        background: '#fff',
      }}>
        {children}
        {/* dynamic island */}
        <div style={{
          position: 'absolute', top: 10, left: '50%', transform: 'translateX(-50%)',
          width: 110, height: 32, borderRadius: 20, background: '#000', zIndex: 100,
          pointerEvents: 'none',
        }} />
        {/* home indicator */}
        <div style={{
          position: 'absolute', bottom: 6, left: '50%', transform: 'translateX(-50%)',
          width: 130, height: 4, borderRadius: 2, background: 'rgba(0,0,0,0.25)', zIndex: 100,
          pointerEvents: 'none',
        }} />
      </div>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <React.Fragment>
      <DesignCanvas>
        <DCSection id="vendedor" title="Vendedor — móvil"
          subtitle="Dashboard del vendedor de campo. Mismo flujo, dos tratamientos del seguimiento.">
          <DCArtboard id="dash-fiel" label="A · Dashboard fiel al brief" width={402} height={874}>
            <Phone><MobileApp metaState={t.metaState} alertHero={false} dark={t.dark} /></Phone>
          </DCArtboard>
          <DCArtboard id="dash-hero" label="B · Alerta de seguimiento como hero" width={402} height={874}>
            <Phone><MobileApp metaState={t.metaState} alertHero={true} dark={t.dark} /></Phone>
          </DCArtboard>
          <DCArtboard id="kanban" label="C · Embudo Kanban (swipe pills)" width={402} height={874}>
            <Phone><MobileApp metaState={t.metaState} initialScreen="embudo" dark={t.dark} /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="admin" title="Administrador — desktop"
          subtitle="Vista de mando con métricas de cumplimiento de seguimiento.">
          <DCArtboard id="admin-dash" label="D · Dashboard del administrador" width={1440} height={900}>
            <AdminDashboard dark={t.dark} />
          </DCArtboard>
        </DCSection>

        <DCPostIt top={140} left={30} rotate={-3} width={180}>
          Tres pantallas. Móvil = 402px (iPhone 14). Tabs inferiores funcionan: Inicio ↔ Embudo ↔ Mapa.
        </DCPostIt>
        <DCPostIt top={420} right={40} rotate={2} width={180}>
          Tweaks ↗ Cambia entre modo claro/oscuro y los 3 estados de la meta semanal.
        </DCPostIt>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Apariencia" />
        <TweakToggle label="Modo oscuro" value={t.dark} onChange={v => setTweak('dark', v)} />

        <TweakSection label="Estado de la meta" />
        <TweakRadio
          label="Avance semanal"
          value={t.metaState}
          options={[
            { value: 'on',  label: 'Cumplida' },
            { value: 'mid', label: 'A medias' },
            { value: 'red', label: 'En rojo' },
          ]}
          onChange={v => setTweak('metaState', v)}
        />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
